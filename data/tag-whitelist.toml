# 博客标签白名单 v1
# 用途：
# 1. 约束新文章的 tags 选择范围
# 2. 为后续逐步清理历史标签提供归并依据
# 3. 供未来发文 skill 直接读取

version = "v1"
max_total_tags = 50
per_post_min = 3
per_post_max = 5
default_allow_new_tags = false
max_candidate_new_tags = 1

[global]
preferred_method_tags = [
  "程序合规",
  "程序正义",
  "制度设计",
  "共同治理",
  "管理实践",
  "组织变革",
  "架构治理",
]

[sections.yifeng_talks]
allowed = [
  "ERP",
  "Vibe Coding",
  "低代码",
  "数字化",
  "敏捷",
  "架构治理",
  "企业管理",
  "组织变革",
  "管理实践",
  "历史",
  "技术史",
  "观念史",
  "史料辨伪",
  "媒体辨伪",
  "国家能力",
  "复杂系统",
  "汽车工业",
  "安全工程",
  "产品逻辑",
  "社会观察",
  "伦理讨论",
]

[sections.property_rights]
allowed = [
  "业委会",
  "业主大会",
  "业主自治",
  "业主参与",
  "物业费",
  "物业合同",
  "物业治理",
  "公共收益",
  "车位管理",
  "物权优先",
  "监督权",
  "表决机制",
  "多数决",
  "换届",
  "程序合规",
  "程序正义",
  "制度设计",
  "分权制衡",
  "共同治理",
  "合同治理",
  "社区治理",
  "行政备案",
  "行政处罚",
  "行政诉讼",
  "法治",
  "依法维权",
  "民法典",
  "信托制",
  "撤销权",
]

[aliases]
# 治理范围统一
"基层治理" = "社区治理"
"小区治理" = "社区治理"
"集体行动" = "共同治理"

# 法理表达统一
"程序正当" = "程序正义"
"法律" = "法治"
"司法救济" = "依法维权"
"证据规则" = "程序合规"

# 管理表达统一
"管理体系" = "企业管理"
"管理哲学" = "企业管理"
"组织决策" = "企业管理"
"历史复盘" = "历史"
"企业史" = "历史"
"结构性压力" = "复杂系统"
"公共安全" = "安全工程"
"公共情绪" = "社会观察"
"叙事批判" = "社会观察"

# 治理概念统一
"责权利" = "制度设计"
"业主知情权" = "监督权"
"物业服务" = "物业治理"
"契约精神" = "合同治理"
"透明度" = "监督权"
"追责机制" = "行政处罚"

[notes]
review_cycle = "每半年复审一次"
legacy_policy = "历史文章允许保留旧标签；新文章优先使用 allowed 与 aliases 归并后的标签"
